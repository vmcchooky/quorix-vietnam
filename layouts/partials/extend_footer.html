<script>
(() => {
  const body = document.body;
  const nav = document.getElementById('site-header');
  const topButton = document.getElementById('scroll-to-top');
  if (!body || !nav) return;

  const idleDelay = 2600;
  let idleTimer;
  let revealTimer;
  let lastRevealAt = 0;
  let lastScrollY = window.scrollY || 0;
  let accumulatedScroll = 0;

  const syncTopButton = () => {
    if (!topButton) return;
    const visible = (window.scrollY || 0) > 140;
    topButton.classList.toggle('is-visible', visible);
    topButton.setAttribute('aria-hidden', visible ? 'false' : 'true');
  };

  const queueIdle = () => {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      if (nav.contains(document.activeElement)) {
        queueIdle();
        return;
      }
      body.classList.remove('is-nav-returning');
      body.classList.add('is-nav-idle');
    }, idleDelay);
  };

  const showNav = () => {
    const wasIdle = body.classList.contains('is-nav-idle');
    body.classList.remove('is-nav-idle');

    if (wasIdle) {
      body.classList.remove('is-nav-returning');
      void nav.offsetWidth;
      body.classList.add('is-nav-returning');
      clearTimeout(revealTimer);
      revealTimer = setTimeout(() => body.classList.remove('is-nav-returning'), 360);
    }

    queueIdle();
  };

  const showNavGuarded = () => {
    const now = Date.now();
    if (now - lastRevealAt < 160) return;
    lastRevealAt = now;
    showNav();
  };

  const handleScrollActivity = () => {
    const nowY = window.scrollY || 0;
    const delta = Math.abs(nowY - lastScrollY);
    lastScrollY = nowY;
    accumulatedScroll += delta;
    syncTopButton();

    if (accumulatedScroll < 12) return;
    accumulatedScroll = 0;
    showNavGuarded();
  };

  ['touchstart', 'pointerdown', 'keydown'].forEach((eventName) => {
    if (eventName === 'keydown') {
      window.addEventListener(eventName, showNavGuarded);
    } else {
      window.addEventListener(eventName, showNavGuarded, { passive: true });
    }
  });

  ['wheel', 'scroll'].forEach((eventName) => {
    window.addEventListener(eventName, handleScrollActivity, { passive: true });
  });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      showNav();
      syncTopButton();
    }
  });

  window.addEventListener('resize', () => {
    accumulatedScroll = 0;
    lastScrollY = window.scrollY || 0;
    syncTopButton();
  }, { passive: true });

  if (topButton) {
    topButton.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      showNav();
      syncTopButton();
    });
  }

  syncTopButton();
  showNav();
})();
</script>
{{- if .IsPage }}
{{- $articleMedia := resources.Get "js/article-media.js" | minify | fingerprint -}}
<script type="module" src="{{ $articleMedia.Permalink }}" integrity="{{ $articleMedia.Data.Integrity }}" crossorigin="anonymous"></script>
{{- end }}
