<button class="qx-font-cycle" id="qx-font-cycle" type="button" aria-live="polite">
  <span class="qx-font-cycle-kicker">Font</span>
  <span class="qx-font-cycle-name" id="qx-font-cycle-name">Nunito</span>
  <span class="qx-font-cycle-hint">Bấm để đổi</span>
</button>

<script>
(() => {
  const body = document.body;
  const nav = document.querySelector('.header');
  if (!nav || !body) return;

  const idleDelay = 2800;
  let idleTimer;
  let revealTimer;
  let lastRevealAt = 0;
  let lastScrollY = window.scrollY || 0;
  let accumulatedScroll = 0;

  const showNav = () => {
    const wasIdle = body.classList.contains('is-nav-idle');
    body.classList.remove('is-nav-idle');

    if (wasIdle) {
      body.classList.remove('is-nav-returning');
      void nav.offsetWidth;
      body.classList.add('is-nav-returning');
      clearTimeout(revealTimer);
      revealTimer = setTimeout(() => body.classList.remove('is-nav-returning'), 440);
    }

    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      body.classList.remove('is-nav-returning');
      body.classList.add('is-nav-idle');
    }, idleDelay);
  };

  const isMobileViewport = () => window.matchMedia('(max-width: 820px)').matches;

  const showNavGuarded = () => {
    const now = Date.now();
    const cooldown = isMobileViewport() ? 460 : 180;
    if (now - lastRevealAt < cooldown) return;
    lastRevealAt = now;
    showNav();
  };

  const handleScrollActivity = () => {
    const nowY = window.scrollY || 0;
    const delta = Math.abs(nowY - lastScrollY);
    lastScrollY = nowY;

    const threshold = isMobileViewport() ? 30 : 9;
    accumulatedScroll += delta;

    if (accumulatedScroll < threshold) return;
    accumulatedScroll = 0;
    showNavGuarded();
  };

  const directEvents = ['touchstart', 'pointerdown', 'keydown'];
  directEvents.forEach((eventName) => {
    if (eventName === 'keydown') {
      window.addEventListener(eventName, showNavGuarded);
    } else {
      window.addEventListener(eventName, showNavGuarded, { passive: true });
    }
  });

  const scrollEvents = ['wheel', 'scroll'];
  scrollEvents.forEach((eventName) => {
    window.addEventListener(eventName, handleScrollActivity, { passive: true });
  });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      showNav();
    }
  });

  window.addEventListener('resize', () => {
    accumulatedScroll = 0;
    lastScrollY = window.scrollY || 0;
  }, { passive: true });

  showNav();
})();
</script>

<script>
(() => {
  const root = document.documentElement;
  const button = document.getElementById('qx-font-cycle');
  const label = document.getElementById('qx-font-cycle-name');
  const hint = button.querySelector('.qx-font-cycle-hint');
  if (!root || !button || !label || !hint) return;

  const storageKey = 'qx:font-preset:v1';
  const presets = [
    { id: 'quicksand', name: 'Quicksand', hint: 'Sans bo tròn' },
    { id: 'nunito', name: 'Nunito', hint: 'Sans mềm' },
    { id: 'noto-serif', name: 'Noto Serif', hint: 'Serif cổ điển' },
    { id: 'bitter', name: 'Bitter', hint: 'Serif đậm nét' }
  ];
  const readStoredPreset = () => {
    try {
      return window.localStorage.getItem(storageKey);
    } catch {
      return null;
    }
  };
  const writeStoredPreset = (value) => {
    try {
      window.localStorage.setItem(storageKey, value);
    } catch {}
  };

  const normalizePreset = (value) => {
    return presets.some((preset) => preset.id === value) ? value : 'nunito';
  };

  const updateButton = (presetId) => {
    const current = presets.find((preset) => preset.id === presetId) || presets[1];
    root.dataset.fontPreset = current.id;
    label.textContent = current.name;
    hint.textContent = current.hint;
    button.setAttribute('aria-label', `Đổi font website. Font hiện tại: ${current.name}`);
    button.title = `Đổi font (${current.name})`;
  };

  const currentPreset = normalizePreset(readStoredPreset());
  updateButton(currentPreset);

  button.addEventListener('click', () => {
    const activePreset = normalizePreset(root.dataset.fontPreset || readStoredPreset());
    const currentIndex = presets.findIndex((preset) => preset.id === activePreset);
    const nextPreset = presets[(currentIndex + 1) % presets.length];
    writeStoredPreset(nextPreset.id);
    updateButton(nextPreset.id);
  });
})();
</script>
