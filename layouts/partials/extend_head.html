{{- $quorixUIStylesheet := site.Params.quorixUIStylesheet | default "https://cdn.jsdelivr.net/npm/@quorix/ui@2.1.4/css/index.css" -}}
{{- $quorixUIScript := site.Params.quorixUIScript | default "https://cdn.jsdelivr.net/npm/@quorix/ui@2.1.4/dist/quorix.min.js" -}}
<script>
  (function () {
    var root = document.documentElement;
    var stored = localStorage.getItem("qx-theme");
    var legacy = localStorage.getItem("pref-theme");
    var theme = stored || legacy;

    if (theme !== "light" && theme !== "dark") {
      theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }

    root.setAttribute("data-theme", theme);
    localStorage.setItem("qx-theme", theme);
    localStorage.setItem("pref-theme", theme);
  })();
</script>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="{{ $quorixUIStylesheet }}" crossorigin="anonymous">
<script defer src="{{ $quorixUIScript }}" crossorigin="anonymous"></script>
<!-- Phase 1: Quorix UI is the only design-system CSS/JS loaded via CDN. -->
<style>
  /* Text justify cho nội dung bài viết và xem trước */
  .qx-prose p, .qx-container-prose p { text-align: justify; hyphens: auto; }
  .qx-card p:not(.qx-text-muted) { text-align: justify; hyphens: auto; }

  /* Skip link ẩn cho đến khi focus */
  .qx-skip-link {
    position: absolute; top: -100px; left: 0; z-index: 9999;
    padding: 0.5rem 1rem; background: var(--qx-brand-blue); color: #fff;
    border-radius: 0 0 var(--qx-radius-md) var(--qx-radius-md);
    font-weight: bold; text-decoration: none; transition: top 0.2s ease;
  }
  .qx-skip-link:focus { top: 0; }

  /* Header layout */
  #site-header {
    position: fixed;
    top: auto;
    bottom: 0.75rem;
    left: 50%;
    right: auto;
    width: min(1080px, calc(100vw - 1rem));
    transform: translateX(-50%);
    z-index: 1000;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.25s ease;
  }
  #site-navbar {
    position: static !important;
    top: auto !important;
    bottom: auto !important;
    left: auto !important;
    right: auto !important;
    width: 100%;
    border-radius: clamp(0.5rem, 3vw, 3rem);
    border: 1px solid color-mix(in srgb, var(--qx-border) 40%, transparent);
    box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    background: color-mix(in srgb, var(--qx-bg-base) 70%, transparent) !important;
  }
  body {
    padding-bottom: 9rem;
  }
  body.is-nav-idle #site-header {
    transform: translateX(-50%) translateY(calc(100% + 1.5rem));
    opacity: 0;
    pointer-events: none;
  }
  body.is-nav-returning #site-header {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
    pointer-events: auto;
  }
  #site-navbar-inner {
    display: grid;
    gap: var(--qx-space-2);
    padding-top: var(--qx-space-4);
    padding-bottom: var(--qx-space-4);
  }
  #site-brand-bar {
    min-width: 0;
  }
  #site-brand-left,
  #site-brand-right {
    min-width: 0;
    flex-shrink: 0;
  }
  #site-brand-left .qx-navbar-brand {
    white-space: nowrap;
    flex-shrink: 0;
  }
  #site-brand-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 3px;
    border-radius: 999px;
    border: 1px solid color-mix(in srgb, var(--qx-border) 68%, var(--qx-brand-blue) 32%);
    background:
      linear-gradient(
        135deg,
        color-mix(in srgb, var(--qx-brand-blue) 14%, transparent),
        color-mix(in srgb, var(--qx-brand-green) 12%, transparent),
        color-mix(in srgb, var(--qx-brand-yellow) 10%, transparent)
      );
    box-shadow:
      0 0 0 1px color-mix(in srgb, var(--qx-bg-base) 70%, transparent) inset,
      0 6px 16px color-mix(in srgb, var(--qx-brand-blue) 10%, transparent);
  }
  #site-brand-left .qx-navbar-brand img {
    border-radius: 50%;
    display: block;
    object-fit: cover;
  }
  #site-theme-toggle {
    padding-inline: var(--qx-space-2);
  }
  #site-theme-toggle .theme-icon-moon {
    display: none;
  }
  html[data-theme="dark"] #site-theme-toggle .theme-icon-sun {
    display: none;
  }
  html[data-theme="dark"] #site-theme-toggle .theme-icon-moon {
    display: block;
  }
  html[data-theme="light"] #site-theme-toggle .theme-icon-sun,
  html[data-theme="auto"] #site-theme-toggle .theme-icon-sun {
    display: block;
  }
  html[data-theme="light"] #site-theme-toggle .theme-icon-moon,
  html[data-theme="auto"] #site-theme-toggle .theme-icon-moon {
    display: none;
  }
  #menu {
    flex-wrap: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding-bottom: 2px;
  }
  #menu::-webkit-scrollbar {
    display: none;
  }
  #menu li,
  #menu a {
    flex-shrink: 0;
    white-space: nowrap;
  }
  #menu a[aria-current="page"] {
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--qx-border) 40%, transparent);
  }
  #home-cta-row,
  #home-social-row {
    align-items: center;
    align-content: flex-start;
  }
  #home-cta-row .qx-btn,
  #home-social-row .qx-btn {
    display: inline-flex;
    width: auto;
    min-height: 0;
    height: auto;
    padding: 0.95rem 1.35rem;
    line-height: 1.15;
    align-items: center;
    justify-content: center;
    align-self: flex-start;
    flex: 0 0 auto;
    white-space: nowrap;
  }
  #home-brand-row {
    align-items: center;
  }
  #home-brand-mark {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
    border-radius: 999px;
  }
  #home-brand-mark::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 999px;
    background: conic-gradient(
      from 0deg,
      var(--qx-brand-blue),
      var(--qx-brand-green),
      var(--qx-brand-yellow),
      var(--qx-brand-red),
      var(--qx-brand-blue)
    );
    animation: qx-brand-orbit 7s linear infinite;
  }
  #home-brand-mark::after {
    content: "";
    position: absolute;
    inset: 3px;
    border-radius: 999px;
    background: color-mix(in srgb, var(--qx-bg-base) 94%, transparent);
  }
  #home-brand-mark-inner {
    position: relative;
    z-index: 1;
    display: inline-flex;
    padding: 3px;
    border-radius: 999px;
    background: color-mix(in srgb, var(--qx-bg-base) 90%, transparent);
  }
  #home-brand-mark img {
    display: block;
    border-radius: 999px;
    object-fit: cover;
  }
  #home-brand-title {
    margin: 0;
    color: var(--qx-brand-red);
    font-weight: 800;
    line-height: 1.1;
  }
  #home-keywords span:nth-child(1) {
    color: color-mix(in srgb, var(--qx-text-main) 6%, var(--qx-brand-blue) 94%);
  }
  #home-keywords span:nth-child(2) {
    color: color-mix(in srgb, var(--qx-text-main) 8%, var(--qx-brand-yellow) 92%);
  }
  #home-keywords span:nth-child(3) {
    color: color-mix(in srgb, var(--qx-text-main) 10%, var(--qx-brand-green) 90%);
  }
  #home-keywords span:nth-child(4) {
    color: var(--qx-brand-red);
    font-weight: 700;
  }
  #home-hero-title {
    margin: 0 !important;
    font-size: clamp(2.2rem, 4.3vw, 3.9rem) !important;
    line-height: 1.15 !important;
    letter-spacing: -0.02em !important;
    max-width: none !important;
  }
  #home-hero-lead {
    margin: 0 !important;
    max-width: none !important;
    line-height: 1.6 !important;
    font-size: 1.25rem !important;
    text-align: left !important;
    hyphens: none !important;
    white-space: normal !important;
  }
  #home-stats-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stat-item {
    display: flex;
    align-items: center;
    gap: 0.25em;
    text-decoration: none;
    color: inherit;
  }
  .home-stat-item:hover { opacity: 0.72; }
  .home-stat-number {
    color: var(--qx-brand-blue);
  }
  .home-stat-divider {
    color: var(--qx-text-muted, #888);
    user-select: none;
  }
  #site-footer-grid {
    grid-template-columns: minmax(0, 1.4fr) minmax(18rem, 1fr);
    align-items: stretch;
  }
  #footer-story,
  #footer-contact {
    height: 100%;
  }
  #footer-story-text {
    margin: 0;
    text-align: justify;
    text-wrap: pretty;
    max-width: 58ch;
    line-height: 1.75;
  }
  #footer-brand-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
    border-radius: 1rem;
    background: color-mix(in srgb, var(--qx-brand-blue) 10%, transparent);
    border: 1px solid color-mix(in srgb, var(--qx-border) 74%, var(--qx-brand-blue) 26%);
  }
  #footer-brand-mark img {
    display: block;
    border-radius: 0.85rem;
    object-fit: cover;
  }
  #footer-brand-title {
    font-size: 1.3rem;
    font-family: var(--qx-font-heading);
    font-weight: 800;
    color: var(--qx-text-main);
  }
  #footer-contact {
    background: linear-gradient(
      155deg,
      color-mix(in srgb, var(--qx-bg-base) 90%, transparent),
      color-mix(in srgb, var(--qx-brand-blue) 7%, transparent)
    );
  }
  #footer-contact-title {
    margin: 0;
    color: color-mix(in srgb, var(--qx-text-main) 80%, var(--qx-brand-blue) 20%);
  }
  #footer-contact .qx-nav-item {
    border: 1px solid color-mix(in srgb, var(--qx-border) 74%, transparent);
    border-radius: 1rem;
    padding: 0.85rem 1rem;
    background: color-mix(in srgb, var(--qx-bg-base) 78%, transparent);
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.04);
  }
  #scroll-to-top {
    position: fixed;
    right: 1rem;
    bottom: 7rem;
    width: 3rem;
    height: 3rem;
    padding: 0;
    border-radius: 999px;
    opacity: 0;
    transform: translateY(12px);
    pointer-events: none;
    z-index: 950;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  #scroll-to-top.is-visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  @media (min-width: 768px) {
    body {
      padding-bottom: 7rem;
    }
    #site-navbar-inner {
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      column-gap: var(--qx-space-6);
    }
    #menu {
      justify-content: flex-end;
    }
    #scroll-to-top {
      bottom: 6.5rem;
      right: 1.25rem;
    }
  }
  @media (max-width: 767px) {
    #site-footer-grid {
      grid-template-columns: 1fr;
    }
    #home-hero-title {
      font-size: clamp(1.1rem, 5vw, 1.6rem) !important;
      line-height: 1.2 !important;
    }
    #home-hero-lead {
      font-size: 0.95rem !important;
      text-align: left !important;
      hyphens: none !important;
    }
    #home-cta-row .qx-btn,
    #home-social-row .qx-btn {
      padding: 0.9rem 1.1rem;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    #site-header,
    #scroll-to-top,
    #home-brand-mark::before {
      transition: none !important;
      animation: none !important;
    }
  }

  /* Chống kéo dãn (stretch feature của flexbox) cho các thẻ Badge trên toàn hệ thống */
  [class*="qx-badge-"] {
    align-self: center;
  }

  @keyframes qx-brand-orbit {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
</style>
