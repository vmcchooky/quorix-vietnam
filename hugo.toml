baseURL = "https://quorix.io.vn/"
title = "Quorix Viet Nam"
theme = "PaperMod"
languageCode = "vi"
defaultContentLanguage = "vi"
paginate = 10

enableInlineShortcodes = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  title = "Quorix Viet Nam"
  description = "Portfolio và Blog chia sẻ kiến thức Hệ thống, Mạng và Bảo mật của Mạnh Cường."
  author = "Mạnh Cường"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowShareButtons = true
  ShowReadingTime = true
  displayFullLangName = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true

  [params.label]
    text = "Quorix Viet Nam"
    icon = "images/brand/quorixAVT.jpg"
    iconHeight = 28

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    includeScore = true
    threshold = 0.35
    minMatchCharLength = 2
    keys = ["title", "permalink", "summary", "content"]

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/vmcchooky"
  [[params.socialIcons]]
    name = "facebook"
    url = "https://facebook.com/quorixvietnam"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Bài viết"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "projects"
    name = "Dự án"
    url = "/projects/"
    weight = 20
  [[menu.main]]
    identifier = "categories"
    name = "Chuyên mục"
    url = "/categories/"
    weight = 30
  [[menu.main]]
    identifier = "tags"
    name = "Từ khóa"
    url = "/tags/"
    weight = 40
  [[menu.main]]
    identifier = "search"
    name = "Tìm kiếm"
    url = "/search/"
    weight = 50

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true
    noClasses = false
    tabWidth = 4