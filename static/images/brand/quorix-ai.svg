<svg viewBox="0 0 120 120" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    Quorix Logo (SVG Version) - Transparent Background
    Brand Colors:
    Red: #EF4444
    Blue: #3B82F6
    Yellow: #F59E0B
  -->
  <g transform="translate(10, 10)">
    <!-- Vòng cung chữ Q (Red) -->
    <path d="M 50,0 C 22.38,0 0,22.38 0,50 C 0,77.62 22.38,100 50,100 C 63.8,100 76.3,94.4 85.3,85.3" 
          fill="none" stroke="#EF4444" stroke-width="16" stroke-linecap="round"/>
    
    <!-- Nét vạch chữ Q (Blue) -->
    <path d="M 65,65 L 100,100" 
          fill="none" stroke="#3B82F6" stroke-width="16" stroke-linecap="round"/>
    
    <!-- Điểm nhấn trung tâm (Yellow) -->
    <circle cx="50" cy="50" r="14" fill="#F59E0B"/>
  </g>
</svg>
